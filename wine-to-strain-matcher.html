// ── ALGORITHM ──────────────────────────────────────────────

function normalizeProfile(profile) {
  const values = Object.values(profile);
  const max = Math.max(...values);
  if (max === 0) return profile;
  const normalized = {};
  for (const [k, v] of Object.entries(profile)) normalized[k] = v / max;
  return normalized;
}

function cosineSimilarity(a, b) {
  const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
  let dot = 0, magA = 0, magB = 0;
  for (const key of allKeys) {
    const va = a[key] || 0, vb = b[key] || 0;
    dot += va * vb; magA += va * va; magB += vb * vb;
  }
  if (magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function dominantTerpeneBonus(wineProfile, strainProfile) {
  const wineSorted = Object.entries(wineProfile).sort((a, b) => b[1] - a[1]);
  const strainSorted = Object.entries(strainProfile).sort((a, b) => b[1] - a[1]);
  const wineTop = wineSorted.slice(0, 2).map(([k]) => k);
  const strainTop = strainSorted.slice(0, 2).map(([k]) => k);
  let bonus = 0;
  if (wineTop[0] === strainTop[0]) bonus += 0.15;
  if (wineTop.some(t => strainTop.includes(t))) bonus += 0.05;
  return bonus;
}

const TERPENE_ALIASES = {
  "\u03B2-caryophyllene": "\u03B2-caryophyllene", "\u03B1-pinene": "\u03B1-pinene",
  "\u03B1-humulene": "\u03B1-humulene", "\u03B1-bisabolol": "\u03B1-bisabolol",
  limonene: "limonene", linalool: "linalool", myrcene: "myrcene",
  terpinolene: "terpinolene", ocimene: "ocimene", geraniol: "geraniol",
  citronellol: "citronellol", eucalyptol: "eucalyptol",
  rotundone: "\u03B2-caryophyllene",
};

function mapWineToCannabisTerpenes(wineProfile) {
  const mapped = {};
  for (const [terpene, value] of Object.entries(wineProfile)) {
    const cannabisName = TERPENE_ALIASES[terpene] || terpene;
    mapped[cannabisName] = (mapped[cannabisName] || 0) + value;
  }
  return mapped;
}

function matchWineToStrains(varietalName, topN = 5) {
  const varietal = WINE_VARIETAL_TERPENES[varietalName];
  if (!varietal) return [];
  const mappedWine = mapWineToCannabisTerpenes(varietal.profile);
  const normWine = normalizeProfile(mappedWine);
  const results = [];
  for (const [strainName, strain] of Object.entries(CANNABIS_STRAINS)) {
    const normStrain = normalizeProfile(strain.profile);
    const similarity = cosineSimilarity(normWine, normStrain);
    const bonus = dominantTerpeneBonus(mappedWine, strain.profile);
    const score = Math.min(1, similarity + bonus);
    results.push({ strain: strainName, score, similarity, bonus, ...strain });
  }
  return results.sort((a, b) => b.score - a.score).slice(0, topN);
}

const TerpeneBar = ({ terpene, value, maxValue }) => {
  const pct = (value / maxValue) * 100;
  const color = TERPENE_COLORS[terpene] || "#888";
  return (
    <div style={{ display: "flex", alignItems: "center", marginBottom: 4, fontSize: 12 }}>
      <div style={{ width: 120, flexShrink: 0, color: "#ccc", fontFamily: "monospace" }}>{terpene}</div>
      <div style={{ flex: 1, height: 14, background: "#2a2a2a", borderRadius: 7, overflow: "hidden", marginRight: 8 }}>
        <div style={{ width: pct + "%", height: "100%", background: color, borderRadius: 7, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ width: 30, textAlign: "right", color: "#888", fontFamily: "monospace", fontSize: 11 }}>{value}</div>
    </div>
  );
};

const MatchCard = ({ match, rank }) => {
  const scoreColor = match.score > 0.85 ? "#4ade80" : match.score > 0.7 ? "#facc15" : "#f87171";
  const energyColor = { HIGH: "#f97316", "MEDIUM-HIGH": "#eab308", MEDIUM: "#3b82f6", "LOW-MEDIUM": "#8b5cf6", LOW: "#6366f1" };
  return (
    <div style={{ background: "#1a1a2e", border: "1px solid " + (rank === 1 ? "#4ade80" : "#333"), borderRadius: 12, padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <span style={{ color: "#666", fontSize: 12 }}>#{rank}</span>
          <h4 style={{ margin: "2px 0", color: "#fff", fontSize: 16 }}>{match.strain}</h4>
          <div style={{ fontSize: 11, color: "#888" }}>{match.source}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: scoreColor, fontFamily: "monospace" }}>
            {Math.round(match.score * 100)}%
          </div>
          <div style={{ display: "inline-block", padding: "2px 8px", borderRadius: 10, fontSize: 10, fontWeight: 600, background: (energyColor[match.energy] || "#666") + "22", color: energyColor[match.energy] || "#666" }}>
            {match.energy}
          </div>
        </div>
      </div>
      {match.intent && <div style={{ fontSize: 11, color: "#888", fontStyle: "italic", marginBottom: 6 }}>{match.intent}</div>}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
        {match.effects.map(e => (
          <span key={e} style={{ padding: "2px 8px", borderRadius: 10, fontSize: 10, background: "#ffffff0a", color: "#aaa" }}>{e}</span>
        ))}
      </div>
      {match.aroma && match.aroma.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
          {match.aroma.map(a => (
            <span key={a} style={{ padding: "2px 8px", borderRadius: 10, fontSize: 10, background: (match.accent_color || "#888") + "18", color: match.accent_color || "#888" }}>{a}</span>
          ))}
        </div>
      )}
      <div>
        {Object.entries(match.profile).sort((a, b) => b[1] - a[1]).map(([t, v]) => (
          <TerpeneBar key={t} terpene={t} value={v} maxValue={Math.max(...Object.values(match.profile))} />
        ))}
      </div>
    </div>
  );
};

const WineryCard = ({ winery, onSelectVarietal }) => (
  <div style={{ background: "#1a1a2e", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
      <div>
        <h4 style={{ margin: 0, color: "#fff", fontSize: 15 }}>{winery.name}</h4>
        <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{winery.location}</div>
      </div>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontSize: 12, color: "#4ade80", fontFamily: "monospace" }}>{winery.bikeTime} bike</div>
        <div style={{ fontSize: 11, color: "#666" }}>{winery.distance}</div>
      </div>
    </div>
    <div style={{ fontSize: 12, color: "#aaa", margin: "8px 0", fontStyle: "italic" }}>{winery.vibe}</div>
    <div style={{ fontSize: 11, color: "#666", marginBottom: 8 }}>{winery.hours}</div>
    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
      {winery.varietals.map(v => (
        <button key={v} onClick={() => onSelectVarietal(v)}
          style={{ padding: "3px 10px", borderRadius: 12, fontSize: 11, border: "1px solid #444", background: "#ffffff08", color: "#ddd", cursor: "pointer", transition: "all 0.2s" }}
          onMouseOver={e => { e.target.style.background = "#4ade8022"; e.target.style.borderColor = "#4ade80"; }}
          onMouseOut={e => { e.target.style.background = "#ffffff08"; e.target.style.borderColor = "#444"; }}>
          {v}
        </button>
      ))}
    </div>
  </div>
);

const AlgorithmExplainer = () => (
  <div style={{ background: "#0f0f1a", border: "1px solid #333", borderRadius: 12, padding: 20, marginBottom: 20 }}>
    <h3 style={{ color: "#4ade80", margin: "0 0 12px 0", fontSize: 14 }}>The Algorithm: Wine \u2192 Terpene \u2192 Strain</h3>
    <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.8 }}>
      <div style={{ marginBottom: 12 }}>
        <strong style={{ color: "#fff" }}>Step 1: Varietal Terpene Extraction</strong><br />
        Each wine grape varietal has a characteristic terpene fingerprint based on wine chemistry research.
        Muscat grapes have 6+ mg/L of free monoterpenes (linalool, geraniol dominant).
        Neutral varieties like Chardonnay have very low concentrations but still express limonene and citronellol.
      </div>
      <div style={{ marginBottom: 12 }}>
        <strong style={{ color: "#fff" }}>Step 2: Terroir & Winemaking Modifiers</strong><br />
        Russian River Valley cool climate = higher terpene preservation. Extended maceration = more skin-contact terpene extraction.
        Oak aging adds vanillin (non-terpene) but doesn't change terpene profile. Sonoma's fog and moderate temps favor aromatic expression.
      </div>
      <div style={{ marginBottom: 12 }}>
        <strong style={{ color: "#fff" }}>Step 3: Cross-Kingdom Terpene Mapping</strong><br />
        Wine and cannabis share key terpenes: linalool (floral), limonene (citrus), myrcene (earthy),
        \u03B2-caryophyllene (pepper/spice), \u03B1-pinene (pine/herb). Wine's rotundone (black pepper) maps to
        cannabis's \u03B2-caryophyllene \u2014 both are sesquiterpenes activating spicy/peppery perception.
      </div>
      <div>
        <strong style={{ color: "#fff" }}>Step 4: Cosine Similarity + Dominant Terpene Matching</strong><br />
        Normalized terpene vectors are compared via cosine similarity (direction match),
        with a bonus for shared dominant terpenes. Score = cosine similarity + dominant match bonus (up to 0.20).
        A 90%+ match means the wine and strain share the same terpene "shape."
      </div>
    </div>
  </div>
);

// ── MAIN APP ───────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab] = useState("matcher");
  const [selectedVarietal, setSelectedVarietal] = useState(null);

  const matches = useMemo(() => {
    if (!selectedVarietal) return [];
    return matchWineToStrains(selectedVarietal, 5);
  }, [selectedVarietal]);

  const varietal = selectedVarietal ? WINE_VARIETAL_TERPENES[selectedVarietal] : null;

  const tabs = [
    { id: "matcher", label: "\uD83C\uDF77 Strain Matcher" },
    { id: "algorithm", label: "\uD83E\uddEC Algorithm" },
    { id: "wineries", label: "\uD83D\uDEB2 Windsor Route" },
    { id: "varietals", label: "\uD83D\uDDFA Varietal Map" },
  ];

  return (
    <div style={{ background: "#0a0a14", color: "#fff", minHeight: "100vh", padding: "20px 16px", maxWidth: 840, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, margin: 0, background: "linear-gradient(135deg, #4ade80, #a78bfa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          Wine \u2192 Terpene \u2192 Strain Matcher
        </h1>
        <div style={{ fontSize: 13, color: "#666", marginTop: 6 }}>Chuck & Austin's Windsor Sonoma Adventure</div>
        <div style={{ fontSize: 11, color: "#444", marginTop: 2 }}>SMART Train: San Rafael \u2192 Windsor | Bike to Wineries | Match Wines to Strains</div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, borderBottom: "1px solid #222", paddingBottom: 8, flexWrap: "wrap" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{ padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: activeTab === t.id ? 600 : 400, border: "none", background: activeTab === t.id ? "#4ade8022" : "transparent", color: activeTab === t.id ? "#4ade80" : "#666", cursor: "pointer", transition: "all 0.2s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab: Strain Matcher */}
      {activeTab === "matcher" && (
        <div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, color: "#888", display: "block", marginBottom: 6 }}>Select a wine varietal to find matching strains:</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {Object.keys(WINE_VARIETAL_TERPENES).map(v => {
                const cat = WINE_VARIETAL_TERPENES[v].category;
                const catColor = { red: "#ef4444", white: "#facc15", "ros\u00E9": "#f472b6", sparkling: "#a78bfa" };
                return (
                  <button key={v} onClick={() => setSelectedVarietal(v)}
                    style={{ padding: "5px 12px", borderRadius: 14, fontSize: 12, border: selectedVarietal === v ? "1px solid #4ade80" : "1px solid #333", background: selectedVarietal === v ? "#4ade8018" : "#ffffff06", color: selectedVarietal === v ? "#4ade80" : "#ccc", cursor: "pointer", transition: "all 0.2s" }}>
                    <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: 3, background: catColor[cat] || "#666", marginRight: 6, verticalAlign: "middle" }} />
                    {v}
                  </button>
                );
              })}
            </div>
          </div>

          {varietal && (
            <div>
              <div style={{ background: "#1a1a2e", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
                  <h3 style={{ margin: 0, fontSize: 16 }}>{selectedVarietal}</h3>
                  <span style={{ padding: "2px 10px", borderRadius: 10, fontSize: 10, fontWeight: 600, background: "#4ade8022", color: "#4ade80" }}>{varietal.terpeneClass} terpenes</span>
                </div>
                <div style={{ fontSize: 12, color: "#aaa", marginBottom: 10 }}>{varietal.notes}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
                  {varietal.typicalAromas.map(a => (
                    <span key={a} style={{ padding: "2px 8px", borderRadius: 8, fontSize: 10, background: "#ffffff08", color: "#888" }}>{a}</span>
                  ))}
                </div>
                {Object.entries(varietal.profile).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).map(([t, v]) => (
                  <TerpeneBar key={t} terpene={t} value={v} maxValue={10} />
                ))}
              </div>
              <h3 style={{ fontSize: 14, color: "#a78bfa", marginBottom: 12 }}>Top Strain Matches for {selectedVarietal}</h3>
              {matches.map((m, i) => <MatchCard key={m.strain} match={m} rank={i + 1} />)}
            </div>
          )}

          {!selectedVarietal && (
            <div style={{ textAlign: "center", padding: 60, color: "#444" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>\uD83C\uDF77 \u2192 \uD83C\uDF3F</div>
              <div style={{ fontSize: 14 }}>Pick a wine varietal above to see matching cannabis strains</div>
            </div>
          )}
        </div>
      )}

      {/* Tab: Algorithm */}
      {activeTab === "algorithm" && <AlgorithmExplainer />}

      {/* Tab: Wineries */}
      {activeTab === "wineries" && (
        <div>
          <div style={{ background: "#0f0f1a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 16 }}>
            <h3 style={{ color: "#4ade80", margin: "0 0 8px 0", fontSize: 14 }}>\uD83D\uDE82 SMART Train Route</h3>
            <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.8 }}>
              <strong style={{ color: "#fff" }}>Bike to San Rafael SMART Station</strong> \u2192 Ride north (~83 min) \u2192 <strong style={{ color: "#fff" }}>Arrive Windsor Station</strong><br />
              Weekend service: 8 round trips. First northbound ~7:16am, last southbound ~7:40pm.<br />
              Bring bikes on train (bike car available). Laptops for hackathon on the ride up.
            </div>
          </div>
          <h3 style={{ fontSize: 14, color: "#a78bfa", marginBottom: 12 }}>Wineries by Distance from Windsor SMART Station</h3>
          <div style={{ fontSize: 11, color: "#666", marginBottom: 12 }}>Click any varietal to jump to the Strain Matcher</div>
          {WINERIES.map(w => (
            <WineryCard key={w.name} winery={w} onSelectVarietal={(v) => { setSelectedVarietal(v); setActiveTab("matcher"); }} />
          ))}
        </div>
      )}

      {/* Tab: Varietal Map */}
      {activeTab === "varietals" && (
        <div>
          <h3 style={{ fontSize: 14, color: "#a78bfa", marginBottom: 4 }}>Wine Varietal \u2192 Terpene Map</h3>
          <div style={{ fontSize: 11, color: "#666", marginBottom: 16 }}>Relative terpene dominance scores (0-10) based on wine chemistry research</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
            {Object.entries(TERPENE_COLORS).map(([name, color]) => (
              <div key={name} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#888" }}>
                <div style={{ width: 10, height: 10, borderRadius: 5, background: color }} />{name}
              </div>
            ))}
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
              <thead>
                <tr>
                  <th style={{ textAlign: "left", padding: "6px 8px", color: "#888", borderBottom: "1px solid #333", position: "sticky", left: 0, background: "#0a0a14", minWidth: 100 }}>Varietal</th>
                  {["linalool", "geraniol", "myrcene", "\u03B2-caryophyllene", "\u03B1-pinene", "limonene", "\u03B1-humulene", "terpinolene"].map(t => (
                    <th key={t} style={{ padding: "6px 4px", color: TERPENE_COLORS[t] || "#888", borderBottom: "1px solid #333", textAlign: "center", minWidth: 32 }}>
                      {t.slice(0, 5)}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {Object.entries(WINE_VARIETAL_TERPENES).map(([name, data]) => (
                  <tr key={name} style={{ cursor: "pointer" }} onClick={() => { setSelectedVarietal(name); setActiveTab("matcher"); }}>
                    <td style={{ padding: "4px 8px", color: "#ccc", borderBottom: "1px solid #1a1a1a", position: "sticky", left: 0, background: "#0a0a14" }}>{name}</td>
                    {["linalool", "geraniol", "myrcene", "\u03B2-caryophyllene", "\u03B1-pinene", "limonene", "\u03B1-humulene", "terpinolene"].map(t => {
                      const val = data.profile[t] || 0;
                      const opacity = val / 10;
                      const color = TERPENE_COLORS[t] || "#888";
                      return (
                        <td key={t} style={{ padding: "4px", textAlign: "center", borderBottom: "1px solid #1a1a1a", background: color + Math.round(opacity * 40).toString(16).padStart(2, "0"), color: val > 0 ? "#fff" : "#333", fontFamily: "monospace" }}>
                          {val || "\u00B7"}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ fontSize: 10, color: "#444", marginTop: 8 }}>Click any row to see strain matches for that varietal</div>
        </div>
      )}

      {/* Footer */}
      <div style={{ textAlign: "center", marginTop: 32, padding: 16, borderTop: "1px solid #1a1a1a", fontSize: 10, color: "#555" }}>
        <div style={{ marginBottom: 4 }}>Wine terpene data: UC Davis Waterhouse Lab, SevenFifty Daily, Nature Horticulture Research</div>
        <div style={{ marginBottom: 4 }}>Cannabis profiles: 43 strains from Chuck's Solful Sessions library (NorCal craft farms)</div>
        <div>Algorithm: Cosine similarity on normalized terpene vectors + dominant terpene bonus</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
